<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri-Vision</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        (function() {
            try {
                var localTheme = localStorage.getItem('theme');
                var sysTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (localTheme === 'dark' || (!localTheme && sysTheme)) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
                
                // SSR-safe inline initialization for language
                var localLang = localStorage.getItem('i18n_lang');
                if (localLang) {
                    document.documentElement.lang = localLang;
                }
            } catch (e) {}
        })();
    </script>
    <script src="{{ url_for('static', filename='js/i18n.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/animations.js') }}" defer></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        window.refreshIcons = function() {
            if (window.lucide) {
                lucide.createIcons();
            }
        };
        document.addEventListener('DOMContentLoaded', () => {
        window.refreshIcons();
        const observer = new MutationObserver((mutations) => {
            let hasNewIcons = false;
            mutations.forEach(m => {
                m.addedNodes.forEach(node => {
                    if (node.nodeType === 1) {
                        if (node.tagName === 'I' && node.hasAttribute('data-lucide')) hasNewIcons = true;
                        if (node.querySelector && node.querySelector('i[data-lucide]')) hasNewIcons = true;
                    }
                });
            });
            if (hasNewIcons) {
                observer.disconnect();
                window.refreshIcons();
                observer.observe(document.body, { childList: true, subtree: true });
            }
        });
        observer.observe(document.body, { childList: true, subtree: true });
    });
    </script>
</head>
<body>
    <main id="swup" class="transition-fade">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <ul id="alert-list">
            {% for category, message in messages %}
                <li style="color: {% if category == 'error' %}red{% else %}green{% endif %};">{{ message }}</li>
            {% endfor %}
            </ul>
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    <footer>
        <hr>
        <p style="font-size:0.95em">Agri-Vision &copy; 2026</p>
    </footer>
    
    <!-- Page Transitions Dependencies -->
    <script src="https://unpkg.com/swup@4"></script>
    <script src="https://unpkg.com/@swup/progress-plugin@3"></script>
    <script src="{{ url_for('static', filename='js/page-transitions.js') }}" defer></script>
</body>
</html>
